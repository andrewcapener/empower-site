  <script>
// ==============================================
// GSAP Marquee Effect
// ==============================================
document.addEventListener('DOMContentLoaded', function() {
    // ============================================
    // Get all marquee containers
    // ============================================
    const marquees = document.querySelectorAll('[data-marquee]');
    if (!marquees.length) return;
    // ============================================
    // Process each marquee
    // ============================================
    marquees.forEach(function(wrap) {
        const track = wrap.querySelector('[data-marquee-content]');
        if (!track) return;
        // ============================================
        // GSAP Context for proper cleanup
        // ============================================
        let ctx = null;
        // ============================================
        // Configuration from attributes
        // ============================================
        const CONFIG = {
            speed: parseFloat(wrap.getAttribute('data-marquee-speed') || '60'),
            direction: (wrap.getAttribute('data-marquee-direction') || 'left').toLowerCase(),
            gap: wrap.getAttribute('data-marquee-gap') || '0rem',
            pauseOnHover: wrap.hasAttribute('data-marquee-pause-hover')
        };
        // ============================================
        // State Variables
        // ============================================
        let tween = null;
        let baseWidth = 0;
        let lastWindowWidth = window.innerWidth;
        // ============================================
        // Apply base styles
        // ============================================
        gsap.set(wrap, {
            position: 'relative',
            overflow: 'hidden',
            width: '100%'
        });
        gsap.set(track, {
            display: 'flex',
            flexWrap: 'nowrap',
            gap: CONFIG.gap
        });
        // ============================================
        // Utility Functions
        // ============================================
        function getOriginalItems() {
            return Array.from(track.children).filter(function(child) {
                return !child.hasAttribute('data-mq-clone');
            });
        }
        function measureBaseWidth() {
            let width = 0;
            getOriginalItems().forEach(function(item) {
                const rect = item.getBoundingClientRect();
                width += rect.width;
            });
            // Add gap between items
            const gapValue = parseFloat(window.getComputedStyle(track).gap) || 0;
            const itemCount = getOriginalItems().length;
            if (itemCount > 1) {
                width += gapValue * itemCount;
            }
            return width;
        }
        function removeClones() {
            Array.from(track.querySelectorAll('[data-mq-clone]')).forEach(function(clone) {
                clone.remove();
            });
        }
        function createClones() {
            const wrapWidth = wrap.offsetWidth;
            const originals = getOriginalItems();
            if (!originals.length || baseWidth === 0) return;
            // Calculate how many sets needed
            const setsNeeded = Math.ceil(wrapWidth / baseWidth) + 2;
            for (let i = 0; i < setsNeeded; i++) {
                originals.forEach(function(item) {
                    const clone = item.cloneNode(true);
                    clone.setAttribute('data-mq-clone', '');
                    clone.setAttribute('aria-hidden', 'true');
                    track.appendChild(clone);
                });
            }
        }
        // ============================================
        // Main Animation Setup
        // ============================================
        function setup() {
            // Kill existing context and animations
            if (ctx) {
                ctx.revert();
                ctx = null;
            }
            // Reset position
            gsap.set(track, { x: 0 });
            // Remove old clones
            removeClones();
            // Measure original content width
            baseWidth = measureBaseWidth();
            if (baseWidth === 0) return;
            // Create enough clones for seamless loop
            createClones();
            // Calculate duration based on speed
            const duration = baseWidth / CONFIG.speed;
            // Create new GSAP context
            ctx = gsap.context(function() {
                // Set starting position for right direction
                if (CONFIG.direction === 'right') {
                    gsap.set(track, { x: -baseWidth });
                }
                // Create seamless loop
                const fromX = CONFIG.direction === 'right' ? -baseWidth : 0;
                const toX = CONFIG.direction === 'right' ? 0 : -baseWidth;
                tween = gsap.fromTo(track, 
                    { x: fromX },
                    {
                        x: toX,
                        duration: duration,
                        ease: 'none',
                        repeat: -1
                    }
                );
            }, wrap);
            // Setup hover events after context creation
            setupHoverEvents();
        }
        // ============================================
        // Hover Pause Setup
        // ============================================
        function setupHoverEvents() {
            if (!CONFIG.pauseOnHover) return;
            // Remove old listeners first
            wrap.removeEventListener('mouseenter', handleMouseEnter);
            wrap.removeEventListener('mouseleave', handleMouseLeave);
            // Add new listeners
            wrap.addEventListener('mouseenter', handleMouseEnter);
            wrap.addEventListener('mouseleave', handleMouseLeave);
        }
        function handleMouseEnter() {
            if (tween) {
                tween.pause();
            }
        }
        function handleMouseLeave() {
            if (tween) {
                tween.play();
            }
        }
        // ============================================
        // Resize Handler (only on window width change)
        // ============================================
        let resizeTimer = null;
        function handleResize() {
            if (resizeTimer) {
                clearTimeout(resizeTimer);
            }
            resizeTimer = setTimeout(function() {
                const newWindowWidth = window.innerWidth;
                // Only rebuild if window WIDTH changed
                // Ignores mobile address bar height changes
                if (newWindowWidth !== lastWindowWidth) {
                    lastWindowWidth = newWindowWidth;
                    setup();
                }
            }, 300);
        }
        window.addEventListener('resize', handleResize);
        // ============================================
        // Visibility Observer (pause when off-screen)
        // ============================================
        const visibilityObserver = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (!tween) return;
                if (entry.isIntersecting) {
                    tween.play();
                } else {
                    tween.pause();
                }
            });
        }, {
            threshold: 0,
            rootMargin: '50px'
        });
        visibilityObserver.observe(wrap);
        // ============================================
        // Reduced Motion Support
        // ============================================
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
        function handleReducedMotion() {
            if (!tween) return;
            if (reducedMotion.matches) {
                tween.pause();
            } else {
                tween.play();
            }
        }
        reducedMotion.addEventListener('change', handleReducedMotion);
        // ============================================
        // Cleanup function for SPA navigation
        // ============================================
        function cleanup() {
            if (ctx) {
                ctx.revert();
            }
            if (resizeTimer) {
                clearTimeout(resizeTimer);
            }
            visibilityObserver.disconnect();
            window.removeEventListener('resize', handleResize);
            wrap.removeEventListener('mouseenter', handleMouseEnter);
            wrap.removeEventListener('mouseleave', handleMouseLeave);
        }
        // Expose cleanup for external use (Barba.js, etc)
        wrap._marqueeCleanup = cleanup;
        // ============================================
        // Initialize after fonts load
        // ============================================
        function init() {
            setup();
            handleReducedMotion();
        }
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(init);
        } else {
            setTimeout(init, 200);
        }
    });
});
</script>
