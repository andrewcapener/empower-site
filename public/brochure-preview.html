    // ============================================

        // ============================================

            gap: wrap.getAttribute('data-marquee-gap') || '0rem',

        // ============================================

            position: 'relative',

            width: '100%'

            display: 'flex',
            flexWrap: 'nowrap',
            gap: CONFIG.gap

        function getOriginalItems() {

            let width = 0;

        // ============================================
